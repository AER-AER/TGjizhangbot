<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="renderer" content="webkit" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
		<script>Vue.config.productionTip = false</script>
		<script src="https://unpkg.com/element-ui/lib/index.js"></script>
		<script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
		<link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
		<title>江山@jsdb 记账机器人</title>
		<style>
			@font-face {
			  font-family: "阿里巴巴普惠体 2.0 35 Thin";font-weight: 250;src: url("//at.alicdn.com/wf/webfont/YBYZRkKhlu43/UTmYd7RMQanjYk-NsdLUP.woff2") format("woff2"),
			  url("//at.alicdn.com/wf/webfont/YBYZRkKhlu43/OEIdge3diKFjMNUxWLt_0.woff") format("woff");
			  font-display: swap;
			}
			body{
				background-color: #d2d2d2;
				display: flex;
				justify-items: center;
				justify-content: center;
				font-family: '阿里巴巴普惠体';
				margin:0;
				padding:0;
			}
			
			.app{
				width: 100%;
				background-color: #fff;
			}

			
			::-webkit-scrollbar {
			width: 8px; /* 宽度 */
			height: 8px; /* 高度 */
			}

			::-webkit-scrollbar-thumb {
			background-color: #666; /* 拖动条的颜色 */
			border-radius: 8px; /* 圆角半径 */
			}

			::-webkit-scrollbar-track {
			background-color: #f5f5f5; /* 轨道的颜色 */
			border-radius: 8px; /* 圆角半径 */
			}

			.select-churukuan{
				font-weight: 600;
				font-size: 20px;
			}
			.unselect-churukuan{
				font-size: 18px;
			}
			
		</style>
		<div class="app" id="app">
			<div style="width: 80%;margin: 10px 10%;">
				<div style="margin-top: 30px;">
					<div style="font-size: 30px;">{{entitiestoUtf16(groupinfo.groupname)}}</div>
				</div>
				<div style="display: flex;margin-top: 20px;">
					<div style="" :class="churukuan==1?'select-churukuan':'unselect-churukuan'" @click="churukuan=1">入款({{rubill.length}}笔)</div>
					<div style="margin-left: 20px;" :class="churukuan==2?'select-churukuan':'unselect-churukuan'" @click="churukuan=2">出款({{chubill.length}}笔)</div>
				</div>
				<div  v-if="churukuan==1" style="margin-top: 20px;">
					<el-table :data="rubill" style="width: 100%"  height="300">
						<el-table-column prop="id" label="ID"> </el-table-column>
						<el-table-column prop="amount" label="金额"> </el-table-column>
						<el-table-column prop="time" label="时间"> </el-table-column>
						<el-table-column prop="caozuoren" label="操作人"> </el-table-column>
					</el-table>
				</div>
				<div  v-if="churukuan==2" style="margin-top: 20px;">
					<el-table :data="chubill" style="width: 100%"  height="300">
						<el-table-column prop="id" label="ID"> </el-table-column>
						<el-table-column prop="amount" label="金额"> </el-table-column>
						<el-table-column prop="time" label="时间"> </el-table-column>
						<el-table-column prop="caozuoren" label="操作人"> </el-table-column>
					</el-table>
				</div>
				<div style="margin-top: 30px;">
					<div style="font-size: 20px;font-weight: 600;margin-bottom: 10px;">总计</div>
					<div>总入款：{{zru}}</div>
					<div>总下发：{{-zchu}}</div>
					<div>未下发：{{zru+zchu}}</div>
				</div>
			</div>
			
		</div>
	</head>
	<body>
</body>
</html>



<script>
	autoDivSize();
	function  autoDivSize(){ //函数：获取尺寸
		// 获取窗口宽度
		if (window.innerWidth){
			winWidth = window.innerWidth;
		}else if ((document.body) && (document.body.clientWidth)){
			winWidth = document.body.clientWidth;
		}
		// 获取窗口高度
		if (window.innerHeight){
			winHeight = window.innerHeight;
		}else if ((document.body) && (document.body.clientHeight)){
			winHeight = document.body.clientHeight;
		}
		 // 通过深入 Document 内部对 body 进行检测，获取窗口大小
		if (document.documentElement && document.documentElement.clientHeight && 　　　　　　document.documentElement.clientWidth)
		{
			winHeight = document.documentElement.clientHeight;
			winWidth = document.documentElement.clientWidth;
		}
		//DIV高度为浏览器窗口高度 的60% 
		document.getElementById("app").style.height= winHeight * 1 +"px";
	}

	window.onresize = () => {
        autoDivSize();
    }
	
	new Vue({
	  el: '#app',
	  data: {
		groupid:"",
		apiURL:'http://kuaisan.icu/jzapi',
		rubill:[],
		chubill:[],
		groupinfo:[],
		zru:0,
		zchu:0,
		churukuan:1
	  },
	  created(res){
		var that = this;
		that.groupid = window.location.search.split("=")[1]
		$.get(that.apiURL+`/getbill?groupinfo=${that.groupid}`).then(res=>{
			that.groupinfo=res.result.groupinfo[0]
			that.rubill=res.result.rubill
			that.chubill=res.result.chubill
			that.zru=parseFloat(res.result.zru.toFixed(2))
			that.zchu=parseFloat(res.result.zchu.toFixed(2))
		})
		setInterval(() => {
			$.get(that.apiURL+`/getbill?groupinfo=${that.groupid}`).then(res=>{
				that.groupinfo=res.result.groupinfo[0]
				that.rubill=res.result.rubill
				that.chubill=res.result.chubill
    			that.zru=parseFloat(res.result.zru.toFixed(2))
    			that.zchu=parseFloat(res.result.zchu.toFixed(2))
			})
		}, 10000);
	  },
	  methods: {
		entitiestoUtf16(strObj) {
			try {
				const patt = /&#\d+;/g;
				const arr = strObj.match(patt) || [];

				let H;
				let L;
				let code;

				for (let i = 0; i < arr.length; i += 1) {
				code = arr[i];
				code = code.replace('&#', '').replace(';', '');
				// 高位
				H = Math.floor((code - 0x10000) / 0x400) + 0xD800;
				// 低位
				L = ((code - 0x10000) % 0x400) + 0xDC00;
				code = `&#${code};`;
				const s = String.fromCharCode(H, L);
				strObj = strObj.replace(code, s);
				}
				return strObj;
			} catch (error) {
				return strObj
			}
		},
		utf16toEntities(str) {
			const patt = /[\ud800-\udbff][\udc00-\udfff]/g; // 检测utf16字符正则
			str = str.replace(patt, (char) => {
			let H;
			let L;
			let code;
			let s;

			if (char.length === 2) {
				H = char.charCodeAt(0); // 取出高位
				L = char.charCodeAt(1); // 取出低位
				code = (H - 0xD800) * 0x400 + 0x10000 + L - 0xDC00; // 转换算法
				s = `&#${code};`;
			} else {
				s = char;
			}

			return s;
			});

			return str;
		},
	},
	})
</script>
